autogenerated = 0

monitor=eDP-1,3840x2400, 0x0,2.0

env = XCURSOR_SIZE,24
env = LIBVA_DRIVER_NAME,nvidia
env = XDG_SESSION_TYPE,wayland
env = GBM_BACKEND,nvidia-drm
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = WLR_NO_HARDWARE_CURSORS,1

exec-once=waybar
exec-once=hyprpaper 
exec-once=udiskie & 
exec-once = /usr/lib/polkit-kde-authentication-agent-1
exec-once = wl-paste --type text --watch cliphist store 
exec-once = wl-paste --type image --watch cliphist store
exec-once = aw-watcher-window-wayland
exec-once = aw-qt
exec-once=dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP

input {
    kb_layout = se
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =

    follow_mouse = 1

    touchpad {
        natural_scroll = no
    }

    sensitivity = 0 
}

general {
    gaps_in = 5
    gaps_out = 5
    border_size = 2
    col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg
    col.inactive_border = rgba(595959aa)

    layout = dwindle
}

decoration {
    rounding = 5
    
    blur {
        enabled = true
        size = 3
        passes = 1
    }

    drop_shadow = no
    shadow_range = 4
    shadow_render_power = 3
    col.shadow = rgba(1a1a1aee)
}


dwindle {
    pseudotile = no
    preserve_split = no
}

master {
    new_is_master = true
}

misc {
    force_default_wallpaper = 0
}

$mainMod = SUPER

bind = $mainMod , RETURN, exec, alacritty
bind = $mainMod SHIFT, Q, killactive, 
bind = $mainMod, P, togglefloating, 
bind = $mainMod, P, pseudo, 
bind = $mainMod, J, togglesplit, 
bind = $mainMod, F, fullscreen, 0
bind = $mainMod SHIFT, F, fullscreen, 1
bind = SUPER, V, exec, cliphist list | wofi --dmenu | cliphist decode | wl-copy

bind = $mainMod, SPACE, exec, wofi --show drun
bind = $mainMod, B, exec, pdf-launcher
bind = $mainMod, R, exec, alacritty -e lfub
bind = $mainMod CTRL, Q, exec, power
bind = $mainMod SHIFT, L, exec, swaylock
bind = $mainMod, S, exec, grim -g "$(slurp)" 

bind = , XF86MonBrightnessUp, exec, backlight --inc 
bind = , XF86MonBrightnessDown, exec, backlight --dec

bind = SUPER, F5, exec, kbbacklight --dec
bind = SUPER SHIFT, F5, exec, kbbacklight --inc

bind = , XF86AudioRaiseVolume, exec, volume --inc 
bind = , XF86AudioLowerVolume, exec, volume --dec 
bind = , XF86AudioMicMute, exec, volume --toggle-mic 
bind = , XF86AudioMute, exec, volume --toggle

bind = , XF86AudioPlay, exec, playerctl play-pause
bind = , XF86AudioPause, exec, playerctl play-pause
bind = , XF86AudioNext, exec, playerctl next
bind = , XF86AudioPrev, exec, playerctl previous

bind = $mainMod CTRL, k, movecurrentworkspacetomonitor, 1 
bind = $mainMod CTRL, j, movecurrentworkspacetomonitor, 0
bind = $mainMod CTRL, l, movewindow, right
bind = $mainMod CTRL, h, movewindow, left

bind = $mainMod, h, movefocus, l
bind = $mainMod, l, movefocus, r 
bind = $mainMod, k, movefocus, u
bind = $mainMod, j, movefocus, d

bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10
