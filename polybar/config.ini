[bar/top]
monitor = ${env:MONITOR:}
width = 100%
height = 60

tray-position = right
tray-padding = 2

background = ${#000000}
foreground = ${#ffffff}

line-size = 2
spacing = 0
padding-right = 0
module-margin = 0
bottom = false

font-0 = "Hack Nerd Font Mono:size=20"
font-1 = "Hack Nerd Font Mono:size=30"

modules-left = i3
modules-right = tray bluetooth wireless battery 

[module/context]
type = custom/script
exec = $POLYBAR_DIR/scripts/context.sh
interval = 10

[module/wireless]
type = internal/network
interface = wlan0
interval = 3.0
format-foreground = ${root.foreground}
format-background = ${root.background}

label-connected = ""
label-connected-foreground = ${root.foreground} 
label-connected-background = ${root.background}
label-connected-font= 2
label-connected-padding = 2

label-disconnected = "睊 Disconnected"
label-disconnected-foreground = ${root.foreground} 
label-disconnected-background = ${root.background} 
label-disconnected-font = 2
label-disconnected-padding = 2

[module/bluetooth] 
type = custom/script
exec = $POLYBAR_DIR/scripts/bluetooth.sh
interval = 2
click-left = exec blueberry
format-background = ${root.background}
format-foreground = ${root.foreground} 
format-font=1
format-padding=1

[module/battery]
type = internal/battery
battery = BAT0
adapter = AC
full-at = 98

label-charging = Charging: %percentage%%
label-discharging = %percentage%%
label-full = %percentage%%

